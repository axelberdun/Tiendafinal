<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tu Carrito | GPU BerdunStore</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        .cart-box { background-color: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); max-width: 750px; margin: 3rem auto; }
        .cart-box h2 { color: #2c3e50; margin-bottom: 1.5rem; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 2rem; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #eeeeee; }
        th { background-color: #f8f9fa; color: #2c3e50; }
        .cart-footer { display: flex; justify-content: space-between; align-items: center; }
        .btn-end { background-color: #27ae60; color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js" defer></script>
    <script src="../js/app.js" defer></script>
</head>
<body>
    <header>
        <div class="logo">GPU BerdunStore</div>
        <nav><ul><li><a href="../index.html">Tienda</a></li></ul></nav>
    </header>
    <main>
        <section class="cart-box">
            <h2>Detalle de tu Compra</h2>
            <div id="itemProducts"></div>
            <div class="cart-footer">
                <a href="../index.html" style="color:#555; text-decoration:none; font-weight:bold;">← Seguir viendo</a>
                <button id="finalizarCompraBtn" class="btn-end">Finalizar Compra</button>
            </div>
        </section>
    </main>
</body>
</html>
